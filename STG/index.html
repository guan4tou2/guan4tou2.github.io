<script>
    document.getElementById('Pinfo').innerHTML = marked.parse('### NFU個人課表產生器\n1. 到ecare的選課結果將選課表格內容複製後貼上\n2. 產生課表後，可下載MD檔自行放至喜歡的markdown preview');
    document.getElementById('Cinfo').innerHTML = marked.parse('### 共同課表產生器\n1. 將個人課表產生出的MD檔改名成`姓名_年級.md`的格式，年級為大幾\\碩幾\n2. 將全部檔案上傳後即可產生課表，可選擇各年級顏色');
    var Pfiledata = "";
    var Cfiledata = "";
    var grades = ['大一', '大二', '大三', '大四', '碩一', '碩二'];

    function Psetcolor() {
        var list = ["Compulsory", "choose", "general"];
        var colorRe = /#[0-9a-fA-F]{6}/s;

        list.forEach(element => {
            if (document.getElementById(element).value.match(colorRe) !== null && document.getElementById(element).value.match(colorRe) != document.getElementById(element + 'i').style.backgroundColor) {
                document.getElementById(element + 'i').style.backgroundColor = document.getElementById(element).value;
                document.getElementById(element + 'i').innerHTML = 'O';
            } else {
                document.getElementById(element + 'i').style.backgroundColor = '';
                document.getElementById(element + 'i').innerHTML = 'X';
            }
        });
    }

    function Csetcolor() {
        var list = ['freshman', 'sophomore', 'junior', 'senior', 'Souichi', 'Shuoji'];
        var colorRe = /#[0-9a-fA-F]{6}/s;

        list.forEach(element => {
            if (document.getElementById(element).value.match(colorRe) !== null && document.getElementById(element).value.match(colorRe) != document.getElementById(element + 'i').style.backgroundColor) {
                document.getElementById(element + 'i').style.backgroundColor = document.getElementById(element).value;
                document.getElementById(element + 'i').innerHTML = 'O';
            } else {
                document.getElementById(element + 'i').style.backgroundColor = '';
                document.getElementById(element + 'i').innerHTML = 'X';
            }
        });
    }

    function PclearMD() {
        document.getElementById('Pmarkdown').innerHTML = '';
        Pfiledata = '';
    }


    function CclearMD() {
        document.getElementById('Cmarkdown').innerHTML = '';
        Cfiledata = '';
    }

    function PshowMD() {
        var classtime = ['', '', '第一節<br>8:10~9:00', ' 第二節<br>9:10~10:00', ' 第三節<br>10:10~11:00', ' 第四節<br>11:10~12:00', '中午',
            ' 第五節<br>13:20~14:10', ' 第六節<br>14:20~15:10', ' 第七節<br>15:20~16:10', ' 第八節<br>16:20~17:10', ' 第九節<br>17:20~18:10'
        ]
        var week = ['一', '二', '三', '四', '五']
        var classlist = []
        var color = [document.getElementById('Compulsory').value, document.getElementById('choose').value, document.getElementById('general').value]

        var PfileData = []
        var str = document.getElementById('person').value;
        const Pregex = /\d+\s+\d{4}\s+\S*\s(\W*)\n[a-zA-Z ()0-9.]*\s+(\S{2})\s+\d.0\s+\d\s+(\S{3,})\s+(\w{3}\d{4})\s+\(\S*\s+\)\s+(.*)/gm;
        const classregex = /\W\/\d/gm;

        classtime.forEach((inside, i) => {
            classlist.push([])
            for (let index = 0; index < 6; index++) {
                classlist[i].push('');
                if (i <= classtime.length) {
                    classlist[i][0] = classtime[i];
                }
            }
        });
        for (let index = 0; index < 6; index++) {
            if (index > 0) {
                classlist[0][index] = week[index - 1];
            }
            classlist[1][index] = ':------------:'
        }
        let m;

        while ((m = Pregex.exec(str)) !== null) {
            if (m.index === Pregex.lastIndex) {
                Pregex.lastIndex++;
            }
            let a = [];
            m.forEach((match, groupIndex) => {
                if (groupIndex == 0) {
                    return;
                }
                a.push(match);
            });
            PfileData.push(a);
        }

        let n;
        PfileData.forEach((data, i) => {
            var classname = data[0];
            var teacher = data[2];
            var classnum = data[3];
            var types;
            var day_time = [];
            data[1] === '必修' ? types = 0 : data[1] === '選修' ? types = 1 : types = 2;

            while ((n = classregex.exec(data[4])) !== null) {
                if (n.index === classregex.lastIndex) {
                    Pregex.lastIndex++;
                }
                n.forEach(match => {
                    day_time.push(match);
                });
            }
            for (let index = 0; index < day_time.length; index++) {
                var day = day_time[index].split('/')[0];
                var t = parseInt(day_time[index].split('/')[1]);
                if (t > 4) {
                    t++;
                }
                classlist[t + 1][week.indexOf(day) + 1] = `<font color=${color[types]}>${classname}<br>${teacher}<br>${classnum}</font>`;
            }
        });
        classlist.forEach(i => {
            Pfiledata += '|'
            i.forEach(j => {
                if (j !== '') {
                    Pfiledata += j + "|";
                } else {
                    Pfiledata += "" + "|";
                }
            });
            Pfiledata += '\n';
        });
        document.getElementById('Pmarkdown').innerHTML = marked.parse(Pfiledata);
    }

    function download(filename, text) {
        var element = document.createElement('a');
        element.setAttribute('href', 'data:md/plain;charset=utf-8,' + encodeURIComponent(text));
        element.setAttribute('download', filename);
        element.style.display = 'none';
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
    }

    function Cdl() {
        if (Cfiledata !== '') {
            download("commonschooltimetable.md", Cfiledata);
        } else {
            alert("no data");
        }
    }

    function Pdl() {
        if (Pfiledata !== '') {
            download("schooltimetable.md", Pfiledata);
        } else {
            alert("no data");
        }
    }

    function CshowMD() {
        const Cregex = /<font color=#\w*>\W*<br>\W*<br>\w{3}\d{4}<\/font>/gm;
        const nameregex = /\W+_\D{2}.md/gm;
        var color = [document.getElementById('freshman').value, document.getElementById('sophomore').value, document.getElementById('junior').value, document.getElementById('senior').value, document.getElementById('Souichi').value, document.getElementById('Shuoji').value]
        var filedata = [];
        var files = document.getElementById('inputGroupFile02').files;
        files instanceof FileList;
        for (let index = 0; index < files.length; index++) {
            var n = files[index].name.match(nameregex);
            if (n) {
                var x;
                var reader = new FileReader();
                reader.readAsText(files[index], 'UTF-8');
                reader.onload = function(e) {
                    filedata.push(this.result);
                };
            } else {
                alert(files[index].name + " isn't md file")
            }
            setTimeout(function() {
                var studentName = files[index].name.split('_')[0];
                var grade = files[index].name.split('_')[1].split('.')[0];
                filedata[index] = filedata[index].replace(Cregex, `<font color=${color[grades.indexOf(grade)]}>${studentName}<br></font>`);
                filedata[index] = filedata[index].split(/\|/);
            }, 2000);
        }
        setTimeout(function() {
            var Data = filedata[0];
            for (let j = 1; j < filedata.length; j++) {
                for (let i = 0; i < Data.length; i++) {
                    if (!Data[i].includes(filedata[j][i])) {
                        Data[i] += filedata[j][i];
                    }
                }
            }
            for (let index = 0; index < Data.length; index++) {
                if (Data[index] !== '') {
                    Cfiledata += Data[index] + "|"
                } else {
                    Cfiledata += '' + "|";
                }
            }
            document.getElementById('Cmarkdown').innerHTML = marked.parse(Cfiledata);
        }, 2000);
    }
</script>
