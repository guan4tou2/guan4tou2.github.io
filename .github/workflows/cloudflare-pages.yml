name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Check Cloudflare API token
        id: cloudflare_token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Cloudflare Pages deployment skipped"
              echo ""
              echo "Set the \`CLOUDFLARE_API_TOKEN\` repository secret to enable deploys."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.cloudflare_token.outputs.has_token == 'true' }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        if: ${{ steps.cloudflare_token.outputs.has_token == 'true' }}
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9.14.4
          run_install: false

      - name: Setup Node.js
        if: ${{ steps.cloudflare_token.outputs.has_token == 'true' }}
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: ${{ steps.cloudflare_token.outputs.has_token == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build
        if: ${{ steps.cloudflare_token.outputs.has_token == 'true' }}
        run: pnpm run build

      - name: Deploy
        if: ${{ steps.cloudflare_token.outputs.has_token == 'true' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: dc86de032a80fff8096894128f0399f2
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm dlx wrangler@4.110.0 pages deploy dist --project-name=guan4tou2-blog --branch=main
